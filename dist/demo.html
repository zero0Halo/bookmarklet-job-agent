<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      html,body,div { margin: 0; padding: 0; font: normal 16px/24px Helvetica Neue, Helvetica, sans-serif; color: #333; }
      #main { max-width: 630px; margin: 3em auto; }
      .bookmarklet { display: inline-block; padding: .5em 1em; color: #fff; background: #50dcf3; border-radius: 4px; text-decoration: none; }
      a { color: #50dcf3; }
      .dim { color: #999; }
    </style>
  </head>
  <body>
    <div id="main">
      <h1>Bookmarklet Job Agent</h1>
      <p>
        Drag this button to your bookmarks bar to save it as a bookmarklet:
      </p>
      <p>
        <a class="bookmarklet" href="javascript:(function()%7B(async()%3D%3E%7Bconst%20o%3Dwindow.location.href.trim().split(%22%3F%22)%5B0%5D%3Bif(!o.includes(%22linkedin.com%22))return%20void%20console.error(%22This%20bookmarklet%20only%20works%20on%20LinkedIn%20job%20postings.%22)%3Bconst%20e%3Ddocument.querySelector(%22%5Bdata-testid%3Dexpandable-text-box%5D%22).innerText%2Ct%3Ddocument.querySelector(%22title%22)%3Be%26%26t%26%26o%3Fnavigator.clipboard.writeText(JSON.stringify(%7BpageTitle%3At.innerText%2CjobDescription%3Ae%2CjobUrl%3Ao%7D)).then(()%3D%3E%7Bconsole.info(%22Successfully%20copied%20to%20clipboard!%5Cn%22)%7D).catch(o%3D%3E%7Bconsole.error(%22Failed%20to%20copy%20to%20clipboard%3A%20%22%2Co)%7D)%3Aconsole.error(%22Could%20not%20find%20job%20description%2C%20title%2C%20or%20URL%22)%7D)()%3B%7D)()">Bookmarklet Job Agent</a>
      </p>
      
      <p class="dim">This page was created with the <a href="https://github.com/mrcoles/bookmarklet">bookmarklet</a> npm library.</p>
    </div>
  </body>
</html>
